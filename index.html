<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadeia Alimentar</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#e8f5e9;
}

#emoji{
font-size:120px;
margin:20px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.produtor{background:#66bb6a;color:white;}
.consumidor{background:#42a5f5;color:white;}
.decompositor{background:#8d6e63;color:white;}

#nivelTrofico{
font-weight:bold;
color:#2e7d32;
}

#vitoria{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
color:white;
align-items:center;
justify-content:center;
flex-direction:column;
}
</style>
</head>

<body>

<h1>🌿 Cadeia Alimentar</h1>

<input id="nomeJogador" placeholder="Digite seu nome">

<div>
<div id="emoji">🌱</div>
<h2 id="serVivo"></h2>
<div id="nivelTrofico"></div>
</div>

<button class="produtor" onclick="responder('Produtor')">Produtor</button>
<button class="consumidor" onclick="responder('Consumidor')">Consumidor</button>
<button class="decompositor" onclick="responder('Decompositor')">Decompositor</button>

<div id="resultado"></div>
<div id="pontuacao">Pontuação: 0</div>

<div id="vitoria">
<h1>🎉 Vitória! 🎉</h1>
<h2 id="pontuacaoFinal"></h2>
<button onclick="reiniciar()">Jogar novamente</button>
</div>

<audio id="somAcerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f0a9d3b0.mp3"></audio>
<audio id="somErro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c1f8c33b5.mp3"></audio>
<audio id="somVitoria" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e0c4d9f6a.mp3"></audio>

<script>

const seres = [
{nome:"Capim", emoji:"🌱", tipo:"Produtor", nivel:"1º nível - Produtor"},
{nome:"Árvore", emoji:"🌳", tipo:"Produtor", nivel:"1º nível - Produtor"},
{nome:"Algas", emoji:"🌿", tipo:"Produtor", nivel:"1º nível - Produtor"},

{nome:"Coelho", emoji:"🐰", tipo:"Consumidor", nivel:"2º nível - Consumidor Primário"},
{nome:"Vaca", emoji:"🐄", tipo:"Consumidor", nivel:"2º nível - Consumidor Primário"},
{nome:"Gafanhoto", emoji:"🦗", tipo:"Consumidor", nivel:"2º nível - Consumidor Primário"},

{nome:"Cobra", emoji:"🐍", tipo:"Consumidor", nivel:"3º nível - Consumidor Secundário"},
{nome:"Sapo", emoji:"🐸", tipo:"Consumidor", nivel:"3º nível - Consumidor Secundário"},

{nome:"Águia", emoji:"🦅", tipo:"Consumidor", nivel:"4º nível - Consumidor Terciário"},
{nome:"Leão", emoji:"🦁", tipo:"Consumidor", nivel:"4º nível - Consumidor Terciário"},

{nome:"Cogumelo", emoji:"🍄", tipo:"Decompositor", nivel:"Decompositor"},
{nome:"Bactéria", emoji:"🦠", tipo:"Decompositor", nivel:"Decompositor"},
{nome:"Minhoca", emoji:"🪱", tipo:"Decompositor", nivel:"Decompositor"}
];

let atual;
let pontos = 0;

function novo(){
atual = seres[Math.floor(Math.random()*seres.length)];

document.getElementById("serVivo").textContent = atual.nome;
document.getElementById("emoji").textContent = atual.emoji;

document.getElementById("nivelTrofico").textContent = "";
document.getElementById("resultado").textContent = "";
}

function responder(escolha){

if(escolha === atual.tipo){
document.getElementById("resultado").textContent = "✅ Acertou!";
document.getElementById("somAcerto").play();
pontos++;
}else{
document.getElementById("resultado").textContent = "❌ Errou!";
document.getElementById("somErro").play();
}

document.getElementById("nivelTrofico").textContent = atual.nivel;

document.getElementById("pontuacao").textContent =
"Pontuação: " + pontos;

if(pontos >= 10){
document.getElementById("vitoria").style.display = "flex";
document.getElementById("pontuacaoFinal").textContent =
"Pontuação: " + pontos;
document.getElementById("somVitoria").play();
}

setTimeout(novo, 1500);
}

function reiniciar(){
pontos = 0;
document.getElementById("vitoria").style.display = "none";
document.getElementById("pontuacao").textContent = "Pontuação: 0";
novo();
}

novo();

</script>

</body>
</html>
